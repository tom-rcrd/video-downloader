<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>akiHome - Downloader</title>
  <style>
    :root {
      --bg: #ebebeb;
      --surface: #ffffff;
      --border: #e3e6ec;
      --text: #1f2430;
      --text-muted: #6b7280;
      --primary: #251cd8;
      --primary-hover: #4338ca;
      --track: #e3e6ec;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16171b;
        --surface: #1f2127;
        --border: #33353d;
        --text: #eceef1;
        --text-muted: #9aa0ac;
        --primary: #6a63f0;
        --primary-hover: #7d76ff;
        --track: #33353d;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--surface);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
    }
    .splash {
      width: 100%;
      padding: 36px 40px;
      text-align: center;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 600;
    }
    h1 i { color: var(--primary); font-style: normal; }
    p.subtitle {
      margin: 0 0 26px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .track {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .bar {
      width: 40%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--primary-hover));
      animation: indeterminate 1.3s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    #status {
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
    }
    #download-btn {
      -webkit-app-region: no-drag;
      margin-top: 16px;
      padding: 9px 18px;
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #download-btn:hover {
      background: var(--primary-hover);
    }
    #download-btn.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="splash">
    <h1>akiHome - <i>Downloader</i></h1>
    <p class="subtitle">Bienvenue</p>
    <div class="track"><div class="bar"></div></div>
    <p id="status">Veuillez patienter...</p>
    <button id="download-btn" type="button" class="hidden">Télécharger Docker Desktop</button>
  </div>
  <script src="splash.js"></script>
</body>
</html>
